# SwiftLint configuration for Citisen
# Solo SwiftUI project, iOS 17+, Swift 5.9
# Docs: https://github.com/realm/SwiftLint

# -------------------------------------------------------
# Paths
# -------------------------------------------------------
included:
  - Citisen
  - CitisenTests
  - CitisenUITests

excluded:
  - Pods
  - Carthage
  - build
  - DerivedData
  - .build
  - fastlane
  - "**/.swiftpm"
  - "**/Generated"          # generated code (e.g. SwiftGen, Sourcery)
  - "**/*.generated.swift"

# -------------------------------------------------------
# Rule selection
# -------------------------------------------------------
disabled_rules:
  - todo                    # allow TODO/FIXME comments during development
  - trailing_comma          # SwiftUI view builders read cleaner without forcing this
  - multiple_closures_with_trailing_closure  # noisy in SwiftUI

opt_in_rules:
  - array_init
  - attributes
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - fallthrough
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicit_return
  - implicitly_unwrapped_optional
  - joined_default_parameter
  - last_where
  - legacy_random
  - literal_expression_end_indentation
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_zero_over_explicit_init
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - yoda_condition
  # Note: unused_import is intentionally omitted here — it belongs in analyzer_rules only

analyzer_rules:
  - unused_declaration
  - unused_import

# -------------------------------------------------------
# Rule configuration
# -------------------------------------------------------
line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true
  ignores_function_declarations: true
  ignores_interpolated_strings: true

file_length:
  warning: 500
  error: 800
  ignore_comment_only_lines: true

type_body_length:
  warning: 300
  error: 500

function_body_length:
  warning: 60
  error: 120

function_parameter_count:
  warning: 6
  error: 8

cyclomatic_complexity:
  warning: 12
  error: 20

nesting:
  type_level:
    warning: 2
  function_level:
    warning: 3

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 70
  excluded:
    - id
    - x
    - y
    - z
    - to
    - by
    - on
    - at
    - ok
    - vm        # common SwiftUI viewmodel shorthand

type_name:
  min_length: 3
  max_length:
    warning: 50
    error: 60

trailing_whitespace:
  ignores_empty_lines: true
  ignores_comments: true

# -------------------------------------------------------
# Custom rules
# -------------------------------------------------------
custom_rules:
  no_print_in_production:
    name: "print() in source"
    regex: '(?<!\\/\\/.*)\\bprint\\('
    message: "Avoid print(); use a proper logger (os.Logger) instead."
    severity: warning
    # Note: match_kinds removed — not supported in custom rules for this SwiftLint version

  no_hardcoded_api_keys:
    name: "Hardcoded API key"
    regex: '(?i)(api[_-]?key|secret|token)\s*=\s*"[A-Za-z0-9_\-]{16,}"'
    message: "Do not hardcode secrets. Read from a secure config or environment."
    severity: error

reporter: "xcode"
